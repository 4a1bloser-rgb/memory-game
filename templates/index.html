<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>記憶翻牌遊戲</title>
    <link rel="stylesheet" href="static\style.css">
</head>

<body>

<!-- ⭐開始畫面 -->
<div id="start-screen" class="overlay">
    <div class="panel">
        <h2>記憶翻牌遊戲</h2>

        <label>選擇難度</label><br><br>
        <select id="start-difficulty">
            <option value="4">4 × 4</option>
            <option value="6">6 × 6</option>
            <option value="8">8 × 8</option>
        </select>

        <br><br>
        <button id="start-btn">開始遊戲</button>
    </div>
</div>

<!-- ⭐結束畫面 -->
<div id="end-screen" class="overlay hidden">
    <div class="panel">
        <h2>完成！🎉</h2>
        <p id="final-text"></p>
        <button id="restart-end">再玩一次</button>
    </div>
</div>

<!-- ⭐主遊戲 -->
<div class="container">
    <h1>記憶翻牌遊戲</h1>

    <div class="top-bar">
        <div class="controls">
            <label for="difficulty">重新選擇難度：</label>
            <select id="difficulty">
                <option value="4">4 × 4</option>
                <option value="6">6 × 6</option>
                <option value="8">8 × 8</option>
            </select>
            <button id="restart">重新開始</button>
        </div>

        <div class="stats">
            <!-- ⭐改成毫秒 -->
            <p>⏱ 時間：<span id="timer">0</span> ms</p>
            <p>🎯 翻牌次數：<span id="moves">0</span></p>
        </div>
    </div>

    <div id="message"></div>

    <div class="layout">
        <div id="leaderboard" class="leaderboard"></div>
        <div id="game-board" class="game-board"></div>
    </div>
</div>

<script>

// =====================
// DOM
// =====================
const difficultySelect = document.getElementById("difficulty");
const restartBtn = document.getElementById("restart");
const gameBoard = document.getElementById("game-board");
const timerDisplay = document.getElementById("timer");
const movesDisplay = document.getElementById("moves");
const message = document.getElementById("message");

// ⭐畫面
const startScreen = document.getElementById("start-screen");
const endScreen = document.getElementById("end-screen");
const startBtn = document.getElementById("start-btn");
const startDifficulty = document.getElementById("start-difficulty");
const finalText = document.getElementById("final-text");
const restartEndBtn = document.getElementById("restart-end");

// =====================
// ⭐ DEVICE ID（新增）
// =====================
function getDeviceId(){
    let id = localStorage.getItem("deviceId");
    if(!id){
        id = crypto.randomUUID();
        localStorage.setItem("deviceId", id);
    }
    return id;
}

// =====================
// state
// =====================
let cards = [];
let flippedCards = [];
let moves = 0;

// ⭐改：毫秒級
let startTime = 0;
let timer;
let gameStarted = false;
let lastScoreId = null;

// =====================
// sound
// =====================
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(type) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === "flip") osc.frequency.value = 600;
    else if (type === "match") osc.frequency.value = 300;
    else if (type === "win") osc.frequency.value = 800;

    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);

    osc.start();
    osc.stop(audioCtx.currentTime + 0.2);
}

// =====================
// game logic
// =====================
function shuffle(array){
    return [...array].sort(()=>Math.random()-0.5);
}

function generateCards(size){
    let arr=[];
    for(let i=1;i<=size*size/2;i++){
        arr.push(i,i);
    }
    return shuffle(arr).map((v,i)=>({
        id:i,value:v,flipped:false,matched:false
    }));
}

// =====================
// ⭐毫秒計時（修改）
// =====================
function startTimer(){
    startTime = Date.now();

    timer = setInterval(()=>{
        const ms = Date.now() - startTime;
        timerDisplay.textContent = ms;
    },10);
}

function stopTimer(){
    clearInterval(timer);
}

function resetGame(){
    const size=parseInt(difficultySelect.value);

    cards=generateCards(size);
    flippedCards=[];
    moves=0;

    // ⭐改
    startTime = 0;

    gameStarted=false;
    lastScoreId=null;

    movesDisplay.textContent=0;
    timerDisplay.textContent=0;
    message.textContent="";

    stopTimer();
    renderBoard(size);
    renderLeaderboard();

    endScreen.classList.add("hidden");
}

function renderBoard(size){
    gameBoard.innerHTML="";
    gameBoard.style.gridTemplateColumns=`repeat(${size},1fr)`;

    cards.forEach(card=>{
        const btn=document.createElement("button");
        btn.className="card";
        btn.dataset.id=card.id;

        btn.innerHTML=`
        <div class="card-inner">
            <div class="card-face card-front">?</div>
            <div class="card-face card-back">${card.value}</div>
        </div>`;

        btn.onclick=()=>handle(card.id);
        gameBoard.appendChild(btn);
    });
}

function handle(id){
    const card=cards.find(c=>c.id===id);
    if(card.flipped||card.matched||flippedCards.length>=2) return;

    if(!gameStarted){
        gameStarted=true;
        startTimer();
    }

    playSound("flip");

    card.flipped=true;
    flippedCards.push(card);

    document.querySelector(`[data-id="${id}"]`).classList.add("flipped");

    if(flippedCards.length===2){
        moves++;
        movesDisplay.textContent=moves;

        const[a,b]=flippedCards;

        if(a.value===b.value){
            playSound("match");
            a.matched=b.matched=true;
            flippedCards=[];
            checkWin();
        }else{
            setTimeout(()=>{
                a.flipped=b.flipped=false;
                flippedCards=[];
                document.querySelector(`[data-id="${a.id}"]`).classList.remove("flipped");
                document.querySelector(`[data-id="${b.id}"]`).classList.remove("flipped");
            },800);
        }
    }
}

// =====================
// WIN
// =====================
async function checkWin(){
    if(cards.every(c=>c.matched)){
        stopTimer();

        const timeMs = Date.now() - startTime;

        finalText.textContent=`恭喜完成！用了 ${timeMs} ms，翻牌 ${moves} 次！`;
        endScreen.classList.remove("hidden");
        playSound("win");

        lastScoreId = await saveScore(timeMs,moves,parseInt(difficultySelect.value));
        await renderLeaderboard();
    }
}

// =====================
// API
// =====================

// ⭐讀排行榜
async function getLeaderboard(size){
    const res = await fetch(`/api/leaderboard/${size}`);
    return await res.json();
}

// ⭐存分數（加 deviceId + ms）
async function saveScore(timeMs,moves,size){

    const newScore = {
        id: Date.now(),
        deviceId: getDeviceId(),   // ⭐新增
        timeMs,                    // ⭐毫秒
        moves,
        size,
        date: new Date().toLocaleString()
    };

    await fetch("/api/leaderboard",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify(newScore)
    });

    return newScore.id;
}

async function renderLeaderboard(){
    const size=parseInt(difficultySelect.value);
    const board=document.getElementById("leaderboard");

    const data=await getLeaderboard(size);

    if(!data.length){
        board.innerHTML=`<h2>🏆 ${size}×${size}</h2><p>還沒有紀錄</p>`;
        return;
    }

    board.innerHTML=`
        <h2>🏆 ${size}×${size}</h2>
        ${data.map((item,i)=>{
            const isCurrent=item.id===lastScoreId;

            return `
            <div class="leaderboard-item ${isCurrent?'current-score':''}">
                <span>#${i+1}</span>
                <span>${item.timeMs}ms / ${item.moves}步</span>
                <span>${item.date}</span>
            </div>`;
        }).join("")}
    `;
}

// =====================
startBtn.onclick=()=>{
    difficultySelect.value=startDifficulty.value;
    startScreen.classList.add("hidden");
    resetGame();
};

restartBtn.onclick=resetGame;
restartEndBtn.onclick=()=>{
    endScreen.classList.add("hidden");
    resetGame();
};

difficultySelect.onchange=resetGame;

renderLeaderboard();

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>記憶翻牌遊戲</title>
    <link rel="stylesheet" href="static/style.css">
</head>

<body>

<!-- ⭐開始畫面 -->
<div id="start-screen" class="overlay">
    <div class="panel">
        <h2>記憶翻牌遊戲</h2>

        <!-- ⭐顯示裝置ID -->
        <p id="device-text">載入中...</p>

        <label>選擇難度</label><br><br>
        <select id="start-difficulty">
            <option value="4">4 × 4</option>
            <option value="6">6 × 6</option>
            <option value="8">8 × 8</option>
        </select>

        <br><br>
        <button id="start-btn">開始遊戲</button>
    </div>
</div>

<!-- ⭐結束畫面 -->
<div id="end-screen" class="overlay hidden">
    <div class="panel">
        <h2>完成！🎉</h2>
        <p id="final-text"></p>
        <button id="restart-end">再玩一次</button>
    </div>
</div>

<!-- ⭐主遊戲 -->
<div class="container">
    <h1>記憶翻牌遊戲</h1>

    <div class="top-bar">
        <div class="controls">
            <label for="difficulty">重新選擇難度：</label>
            <select id="difficulty">
                <option value="4">4 × 4</option>
                <option value="6">6 × 6</option>
                <option value="8">8 × 8</option>
            </select>
            <button id="restart">重新開始</button>
        </div>

        <div class="stats">
            <p>⏱ 時間：<span id="timer">0.000</span> 秒</p>
            <p>🎯 翻牌次數：<span id="moves">0</span></p>
        </div>
    </div>

    <div id="message"></div>

    <div class="layout">
        <div id="leaderboard" class="leaderboard"></div>
        <div id="game-board" class="game-board"></div>
    </div>
</div>

<script>

// =====================
// DOM
// =====================
const difficultySelect = document.getElementById("difficulty");
const restartBtn = document.getElementById("restart");
const gameBoard = document.getElementById("game-board");
const timerDisplay = document.getElementById("timer");
const movesDisplay = document.getElementById("moves");
const message = document.getElementById("message");

const startScreen = document.getElementById("start-screen");
const endScreen = document.getElementById("end-screen");
const startBtn = document.getElementById("start-btn");
const startDifficulty = document.getElementById("start-difficulty");
const finalText = document.getElementById("final-text");

const deviceText = document.getElementById("device-text");

// =====================
// DEVICE ID
// =====================
function getDeviceId(){
    let id = localStorage.getItem("deviceId");
    if(!id){
        id = crypto.randomUUID();
        localStorage.setItem("deviceId", id);
    }
    return id;
}

// 顯示ID
deviceText.textContent = "你是 #" + getDeviceId().slice(0,8);

// =====================
// STATE
// =====================
let cards = [];
let flippedCards = [];
let moves = 0;

let startTime = 0;
let timer;
let gameStarted = false;
let lastScoreId = null;

// =====================
// TIMER（毫秒）
// =====================
function startTimer(){
    startTime = performance.now();

    timer = setInterval(()=>{
        const ms = (performance.now() - startTime) / 1000;
        timerDisplay.textContent = ms.toFixed(3);
    }, 50);
}

function stopTimer(){
    clearInterval(timer);
}

// =====================
// GAME
// =====================
function shuffle(a){
    return [...a].sort(()=>Math.random()-0.5);
}

function generateCards(size){
    let arr=[];
    for(let i=1;i<=size*size/2;i++){
        arr.push(i,i);
    }
    return shuffle(arr).map((v,i)=>({
        id:i,value:v,flipped:false,matched:false
    }));
}

function resetGame(){
    const size=parseInt(difficultySelect.value);

    cards=generateCards(size);
    flippedCards=[];
    moves=0;
    gameStarted=false;
    lastScoreId=null;

    timerDisplay.textContent="0.000";
    movesDisplay.textContent=0;
    message.textContent="";

    stopTimer();
    renderBoard(size);
    renderLeaderboard();

    endScreen.classList.add("hidden");
}

function renderBoard(size){
    gameBoard.innerHTML="";
    gameBoard.style.gridTemplateColumns=`repeat(${size},1fr)`;

    cards.forEach(card=>{
        const btn=document.createElement("button");
        btn.className="card";
        btn.dataset.id=card.id;

        btn.innerHTML=`
        <div class="card-inner">
            <div class="card-face card-front">?</div>
            <div class="card-face card-back">${card.value}</div>
        </div>`;

        btn.onclick=()=>handle(card.id);
        gameBoard.appendChild(btn);
    });
}

function handle(id){
    const card=cards.find(c=>c.id===id);
    if(card.flipped||card.matched||flippedCards.length>=2) return;

    if(!gameStarted){
        gameStarted=true;
        startTimer();
    }

    card.flipped=true;
    flippedCards.push(card);

    document.querySelector(`[data-id="${id}"]`).classList.add("flipped");

    if(flippedCards.length===2){
        moves++;
        movesDisplay.textContent=moves;

        const[a,b]=flippedCards;

        if(a.value===b.value){
            a.matched=b.matched=true;
            flippedCards=[];
            checkWin();
        }else{
            setTimeout(()=>{
                a.flipped=b.flipped=false;
                flippedCards=[];
                document.querySelector(`[data-id="${a.id}"]`).classList.remove("flipped");
                document.querySelector(`[data-id="${b.id}"]`).classList.remove("flipped");
            },800);
        }
    }
}

// =====================
// WIN
// =====================
async function checkWin(){
    if(cards.every(c=>c.matched)){
        stopTimer();

        const timeMs = (performance.now() - startTime)/1000;

        finalText.textContent =
        `完成！ ${timeMs.toFixed(3)} 秒 / ${moves} 步`;

        endScreen.classList.remove("hidden");

        lastScoreId = await saveScore(timeMs,moves,parseInt(difficultySelect.value));
        await renderLeaderboard();
    }
}

// =====================
// API
// =====================
async function getLeaderboard(size){
    const res = await fetch(`/api/leaderboard/${size}`);
    return await res.json();
}

async function saveScore(timeMs,moves,size){

    const newScore = {
        id: Date.now(),
        deviceId: getDeviceId(),
        timeMs,
        moves,
        size,
        date: new Date().toLocaleString()
    };

    await fetch("/api/leaderboard",{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify(newScore)
    });

    return newScore.id;
}

async function renderLeaderboard(){
    const size=parseInt(difficultySelect.value);
    const board=document.getElementById("leaderboard");

    const data=await getLeaderboard(size);

    if(!data.length){
        board.innerHTML=`<h2>🏆 ${size}×${size}</h2><p>還沒有紀錄</p>`;
        return;
    }

    board.innerHTML=`
        <h2>🏆 ${size}×${size}</h2>
        ${data.map((item,i)=>{
            const isCurrent=item.id===lastScoreId;

            return `
            <div class="leaderboard-item ${isCurrent?'current-score':''}">
                <span>#${i+1}</span>
                <span>${item.timeMs.toFixed(3)}s / ${item.moves}步</span>
                <span>${item.deviceId?.slice(0,8) || "?"}</span>
            </div>`;
        }).join("")}
    `;
}

// =====================
// EVENTS
// =====================
startBtn.onclick=()=>{
    difficultySelect.value=startDifficulty.value;
    startScreen.classList.add("hidden");
    resetGame();
};

restartBtn.onclick=resetGame;

document.getElementById("restart-end").onclick=()=>{
    endScreen.classList.add("hidden");
    resetGame();
};

difficultySelect.onchange=resetGame;

// init
renderLeaderboard();

</script>
</body>
</html>
